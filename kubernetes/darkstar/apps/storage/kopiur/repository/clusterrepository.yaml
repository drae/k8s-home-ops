---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  # Fresh kopia repository — the existing NFS export (/mnt/zstore/backup/volsync)
  # is a restic repository and cannot be reused. This path must exist on the NAS,
  # chowned 2000:2000 (the UID/GID every app's backup mover already runs as).
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: 10.1.10.10
          path: /mnt/zstore/backup/kopiur
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: storage
      key: KOPIA_PASSWORD
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: policyName
  moverDefaults:
    cache:
      storageClassName: local-hostpath
    scratch:
      storageClassName: local-hostpath
  server:
    namespace: storage
    readOnly: true
    auth:
      generate: {}
    securityContext:
      runAsUser: 2000
      runAsGroup: 2000
