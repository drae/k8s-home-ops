---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kopiur
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.6.0
  url: oci://ghcr.io/home-operations/charts/kopiur
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    installScope: cluster
    controller:
      extraVolumes:
        - name: repo
          nfs:
            path: 10.1.10.10
            server: /mnt/zstore/backup/kopiur
      extraVolumeMounts:
        - name: repo
          mountPath: /repo
      resources:
        requests:
          cpu: 100m
        limits:
          memory: 2Gi
      streamingLists: true
    features:
      credentialProjection:
        enabled: true
    monitoring:
      dashboards:
        enabled: true
      prometheusRule:
        enabled: true
      serviceMonitor:
        enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 2000
      runAsGroup: 2000
      fsGroup: 2000
      fsGroupChangePolicy: OnRootMismatch
    webhook:
      serviceMonitor:
        enabled: true
