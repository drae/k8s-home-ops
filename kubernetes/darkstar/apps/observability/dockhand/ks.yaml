---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname dockhand
  namespace: &namespace observability
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/volsync
  interval: 10m
  path: "./kubernetes/darkstar/apps/observability/dockhand/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: k8s-home-ops
    namespace: flux-system
  wait: false # no flux ks dependents
  postBuild:
    substitute:
      APP: *appname
      VOLSYNC_CLAIM: dockhand-data
      VOLSYNC_CAPACITY: 5Gi
      KOPIUR_CLAIM: dockhand-data
      KOPIUR_CAPACITY: 5Gi
  dependsOn:
    - name: volsync
      namespace: storage
