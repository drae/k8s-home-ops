---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-iot",
                "namespace": "networking",
                "ips": [
                  "10.1.20.33/24",
                  "fd79:4c9c:b9c3:20::33/64"
                ]
              }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.4@sha256:589e4c1c93025d01320c14329427197c8b52d4f2e241a6bc1d6207837e07b4a7
            env:
              TZ: Europe/London
              VENV_FOLDER: /venv
              # HASS_TRUSTED_PROXIES same as the cluster CIDR address range
              HASS_TRUSTED_PROXIES: 10.244.0.0/16
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            resources:
              requests:
                cpu: 126m
                memory: 512M
              limits:
                memory: 3Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          matter-hub:
            image:
              repository: ghcr.io/riddix/home-assistant-matter-hub
              tag: 2.0.42@sha256:c95aef9983549b168d6accc3179d7b1c71d4a3fb893e63c10eb798aefe4393e0
            env:
              HAMH_STORAGE_LOCATION: /config/matter-hub
              HAMH_HOME_ASSISTANT_URL: http://localhost:8123/
              HAMH_LOG_LEVEL: info
              HAMH_HTTP_PORT: "8482"
            envFrom:
              - secretRef:
                  name: home-assistant-matter-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          #          presence-sensor-configurator:
          #            image:
          #              repository: docker.io/everythingsmarthome/everything-presence-mmwave-configurator
          #              tag: 2.0.12
          #            env:
          #              HA_BASE_URL: http://localhost:8123
          #              APP_PORT: 42069
          #              FIRMWARE_LAN_PORT: 38080
          #            envFrom:
          #              - secretRef:
          #                  name: home-assistant-secret
          #            securityContext:
          #              allowPrivilegeEscalation: false
          #              readOnlyRootFilesystem: true
          #              capabilities:
          #                drop:
          #                  - ALL
          #          wyoming-proxy-azure-stt:
          #            image:
          #              repository: ghcr.io/hugobloem/wyoming-microsoft-stt-noha
          #              tag: 1.3.8@sha256:121c697b0c5827bd0887eca32792cc3863ecc76053e428843b5003bdab715479
          #            args:
          #              - --language=en-GB
          #              - --uri=tcp://0.0.0.0:10301
          #            envFrom:
          #              - secretRef:
          #                  name: home-assistant-ai-secret
          #            securityContext:
          #              allowPrivilegeEscalation: false
          #              readOnlyRootFilesystem: true
          #              capabilities:
          #                drop:
          #                  - ALL
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
              pullPolicy: IfNotPresent
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "12321"
              - /config
            env:
              HASS_SERVER: http://localhost:8123
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: &port 8123
      matter-hub:
        ports:
          matter-hub:
            port: &matter-port 8482
      #      presence-sensor-configurator:
      #        ports:
      #          http:
      #            port: &presence-port 42069
      #          firmware:
      #            port: 38080
      code-server:
        ports:
          code-server:
            port: &code-server-port 12321
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - hass.starstreak.net
        parentRefs:
          - name: envoy-internal
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /code/
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: code-server
                port: *code-server-port
          - matches:
              - path:
                  type: PathPrefix
                  value: /matter/
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  add:
                    - name: "x-ingress-path"
                      value: "matter"
            backendRefs:
              - identifier: matter-hub
                port: *matter-port
          #          - matches:
          #              - path:
          #                  type: PathPrefix
          #                  value: /presence/
          #            filters:
          #              - type: URLRewrite
          #                urlRewrite:
          #                  path:
          #                    type: ReplacePrefixMatch
          #                    replacePrefixMatch: /
          #            backendRefs:
          #              - identifier: presence-sensor-configurator
          #                port: *presence-port
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: "${VOLSYNC_CLAIM}"
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            matter-hub:
              - path: /config
            #            presence-sensor-configurator:
            #              - path: /config
            code-server:
              - path: /config
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
      hass-cache:
        existingClaim: hass-cache
        advancedMounts:
          home-assistant:
            app:
              - path: /venv
                subPath: hass-venv
      tmpfs:
        type: emptyDir
        advancedMounts:
          home-assistant:
            app:
              - path: /tmp
                subPath: hass-tmp
            code-server:
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
