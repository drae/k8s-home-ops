---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${KOPIUR_CLAIM:-${APP}}"
spec:
  accessModes:
    - "${KOPIUR_ACCESSMODES:-ReadWriteOnce}"
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: ${APP}
  resources:
    requests:
      storage: "${KOPIUR_CAPACITY:-1Gi}"
  storageClassName: "${KOPIUR_STORAGECLASS:-topolvm-thin-provisioner}"
