---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  credentialProjection:
    enabled: true
  mover:
    securityContext:
      runAsUser: ${APP_UID:-2000}
      runAsGroup: ${APP_GID:-2000}
  repository:
    kind: ClusterRepository
    name: nas
  retention:
    keepHourly: 24
    keepDaily: 7
  sources:
    - pvc:
        name: "${KOPIUR_CLAIM:-${APP}}"
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:-topolvm-thin-provisioner}
