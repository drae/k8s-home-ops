---
services:
  tvh:
    image: ghcr.io/linuxserver/tvheadend:latest@sha256:62ce7b51e6dc6f74d84c16ed46f1f8553d88e618c16598be294dfb19bd358066
    container_name: tvheadend
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    network_mode: host
    volumes:
      - /opt/docker/tvh/data:/config
    devices:
      - /dev/dri:/dev/dri
      - /dev/dvb:/dev/dvb
