---
services:
  tvh:
    image: ghcr.io/linuxserver/tvheadend:latest@sha256:ccd9f055f0eb5c78c43b40397e35ff30a884a40389222ef04f2e33efecbd3067
    container_name: tvheadend
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    network_mode: host
    volumes:
      - /opt/docker/tvh/data:/config
    devices:
      - /dev/dri:/dev/dri
      - /dev/dvb:/dev/dvb
